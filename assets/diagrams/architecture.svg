  <text x="600" y="725" text-anchor="middle" fill="#64748b" font-size="11">Built with Qwen Cloud · Rust · Axum · Tokio · Alibaba Cloud ECS · MIT License</text>

  <!-- Side annotation: what makes this an Agent Society -->
  <rect x="1050" y="220" width="140" height="400" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1120" y="250" text-anchor="middle" fill="#10b981" font-size="11" font-weight="bold">Agent Society</text>
  <line x1="1070" y1="260" x2="1170" y2="260" stroke="#334155" stroke-width="0.5"/>
  <text x="1120" y="285" text-anchor="middle" fill="#94a3b8" font-size="9">12 specialized agents</text>
  <text x="1120" y="305" text-anchor="middle" fill="#94a3b8" font-size="9">Concurrent execution</text>
  <text x="1120" y="325" text-anchor="middle" fill="#94a3b8" font-size="9">Raft consensus</text>
  <text x="1120" y="345" text-anchor="middle" fill="#94a3b8" font-size="9">Self-healing</text>
  <text x="1120" y="365" text-anchor="middle" fill="#94a3b8" font-size="9">Genetic evolution</text>
  <text x="1120" y="385" text-anchor="middle" fill="#94a3b8" font-size="9">IQ measured: 188</text>
  <text x="1120" y="405" text-anchor="middle" fill="#94a3b8" font-size="9">Zero downtime</text>
  <text x="1120" y="425" text-anchor="middle" fill="#94a3b8" font-size="9">Memory LTS</text>
  <text x="1120" y="445" text-anchor="middle" fill="#94a3b8" font-size="9">Knowledge fabric</text>
  <text x="1120" y="465" text-anchor="middle" fill="#94a3b8" font-size="9">Security audit</text>
  <text x="1120" y="485" text-anchor="middle" fill="#94a3b8" font-size="9">Time machine</text>
  <text x="1120" y="505" text-anchor="middle" fill="#94a3b8" font-size="9">Cognitive ISA</text>
  <text x="1120" y="525" text-anchor="middle" fill="#94a3b8" font-size="9">Semantic ABI</text>
  <line x1="1070" y1="540" x2="1170" y2="540" stroke="#334155" stroke-width="0.5"/>
  <text x="1120" y="565" text-anchor="middle" fill="#facc15" font-size="10" font-weight="bold">Production-proven</text>
  <text x="1120" y="585" text-anchor="middle" fill="#facc15" font-size="10" font-weight="bold">Open source</text>
</svg>
