  <rect x="200" y="585" width="800" height="80" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="600" y="615" text-anchor="middle" fill="#facc15" font-size="14" font-weight="bold">📊 System IQ: 188 FSIQ · Uptime: 938s · 0 Errors · 100% SLA</text>
  <line x1="300" y1="628" x2="900" y2="628" stroke="#334155" stroke-width="0.5"/>
  <text x="600" y="650" text-anchor="middle" fill="#94a3b8" font-size="11">Immune System: Healthy · Entropy: 0.0 · Self-Improvement: Active · 24 Active Workers</text>

  <!-- Arrow: Metrics → Footer -->
  <line x1="600" y1="665" x2="600" y2="700" stroke="#334155" stroke-width="1"/>

