<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="qwen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="society" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="mesh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  <text x="600" y="40" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">AIGON-X Agent Society — Architecture</text>

  <!-- Layer 1: Qwen Cloud MaaS -->
  <rect x="400" y="60" width="400" height="100" rx="12" fill="url(#qwen)" opacity="0.9"/>
  <text x="600" y="95" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">☁ Qwen Cloud MaaS</text>
  <text x="600" y="118" text-anchor="middle" fill="#c4b5fd" font-size="12">qwen3.7-max · qwq-plus · qwen-vl-max</text>
  <text x="600" y="138" text-anchor="middle" fill="#c4b5fd" font-size="12">text-embedding-v4 · qwen-image-2.0-pro</text>

  <!-- Arrow: Qwen → Runtime -->
  <line x1="600" y1="160" x2="600" y2="210" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="600,220 594,210 606,210" fill="#6366f1"/>

  <!-- Layer 2: Runtime Engine -->
  <rect x="150" y="220" width="900" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="248" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="bold">AIGON-X Runtime v2 — Agent Society Engine</text>

  <!-- Kernel boxes - 12 kernels in 3 rows of 4 -->
  <g font-size="10" text-anchor="middle">
    <!-- Row 1 -->
    <rect x="170" y="265" width="95" height="35" rx="6" fill="#0ea5e9" opacity="0.8"/>
    <text x="217" y="286" fill="#fff" font-weight="bold">🧠 Nano</text>
    <text x="217" y="296" fill="#e0f2fe" font-size="8">200 workers</text>

    <rect x="280" y="265" width="95" height="35" rx="6" fill="#8b5cf6" opacity="0.8"/>
    <text x="327" y="286" fill="#fff" font-weight="bold">⚡ Curie</text>
    <text x="327" y="296" fill="#ede9fe" font-size="8">Cognition</text>

    <rect x="390" y="265" width="95" height="35" rx="6" fill="#f59e0b" opacity="0.8"/>
    <text x="437" y="286" fill="#fff" font-weight="bold">📋 Planck</text>
    <text x="437" y="296" fill="#fef3c7" font-size="8">Plans: 222</text>

    <rect x="500" y="265" width="95" height="35" rx="6" fill="#10b981" opacity="0.8"/>
    <text x="547" y="286" fill="#fff" font-weight="bold">💾 Freud</text>
    <text x="547" y="296" fill="#d1fae5" font-size="8">Memory LTS</text>

    <!-- Row 2 -->
    <rect x="170" y="310" width="95" height="35" rx="6" fill="#06b6d4" opacity="0.8"/>
    <text x="217" y="331" fill="#fff" font-weight="bold">🔬 Galileo</text>
    <text x="217" y="341" fill="#cffafe" font-size="8">Reviews: 223</text>

    <rect x="280" y="310" width="95" height="35" rx="6" fill="#ef4444" opacity="0.8"/>
    <text x="327" y="331" fill="#fff" font-weight="bold">🤝 Yairoslaw</text>
    <text x="327" y="341" fill="#fee2e2" font-size="8">Consensus</text>

    <rect x="390" y="310" width="95" height="35" rx="6" fill="#14b8a6" opacity="0.8"/>
    <text x="437" y="331" fill="#fff" font-weight="bold">📚 Hawking</text>
    <text x="437" y="341" fill="#ccfbf1" font-size="8">Facts: 223</text>

    <rect x="500" y="310" width="95" height="35" rx="6" fill="#a855f7" opacity="0.8"/>
    <text x="547" y="331" fill="#fff" font-weight="bold">🧩 Knowledge</text>
    <text x="547" y="341" fill="#f3e8ff" font-size="8">5 sources</text>

    <!-- Row 3 -->
    <rect x="610" y="265" width="95" height="35" rx="6" fill="#ec4899" opacity="0.8"/>
    <text x="657" y="286" fill="#fff" font-weight="bold">✅ Turing</text>
    <text x="657" y="296" fill="#fce7f3" font-size="8">222 checks</text>

    <rect x="720" y="265" width="95" height="35" rx="6" fill="#f97316" opacity="0.8"/>
    <text x="767" y="286" fill="#fff" font-weight="bold">🎯 Nash</text>
    <text x="767" y="296" fill="#ffedd5" font-size="8">Decisions</text>

    <rect x="830" y="265" width="95" height="35" rx="6" fill="#22c55e" opacity="0.8"/>
    <text x="877" y="286" fill="#fff" font-weight="bold">🧬 Darwin</text>
    <text x="877" y="296" fill="#dcfce7" font-size="8">223 gen</text>

    <rect x="940" y="265" width="95" height="35" rx="6" fill="#64748b" opacity="0.8"/>
    <text x="987" y="286" fill="#fff" font-weight="bold">🛡️ Yudai</text>
    <text x="987" y="296" fill="#f1f5f9" font-size="8">Security</text>
  </g>

  <!-- Arrow: Runtime → Mesh -->
  <line x1="600" y1="360" x2="600" y2="405" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="600,415 594,405 606,405" fill="#94a3b8"/>

