  <text x="600" y="445" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">🌐 4-Node Mesh Federation — Raft CRDT Consensus</text>

  <g font-size="11" text-anchor="middle">
    <rect x="180" y="460" width="190" height="55" rx="8" fill="#78350f" opacity="0.7"/>
    <text x="275" y="482" fill="#fde68a" font-weight="bold">Master (local)</text>
    <text x="275" y="498" fill="#fef3c7" font-size="9">prim.aigon.dev:7000</text>

    <rect x="395" y="460" width="190" height="55" rx="8" fill="#78350f" opacity="0.7"/>
    <text x="490" y="482" fill="#fde68a" font-weight="bold">Worker 1</text>
    <text x="490" y="498" fill="#fef3c7" font-size="9">sec.aigon.dev:7000</text>

    <rect x="610" y="460" width="190" height="55" rx="8" fill="#78350f" opacity="0.7"/>
    <text x="705" y="482" fill="#fde68a" font-weight="bold">Worker 2</text>
    <text x="705" y="498" fill="#fef3c7" font-size="9">100.110.245.84:7000</text>

    <rect x="825" y="460" width="190" height="55" rx="8" fill="#78350f" opacity="0.7"/>
    <text x="920" y="482" fill="#fde68a" font-weight="bold">Worker 3 (Alibaba)</text>
    <text x="920" y="498" fill="#fef3c7" font-size="9">ECS ap-southeast-1</text>
  </g>

  <!-- Arrow: Mesh → Metrics -->
  <line x1="600" y1="535" x2="600" y2="575" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="600,585 594,575 606,575" fill="#94a3b8"/>

