<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AIGON Agent Society — Live Runtime</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0b0f;--surface:#111318;--surface2:#181b24;--border:#23263b;--cyan:#00f0ff;--magenta:#c084fc;--green:#22d3a7;--yellow:#fbbf24;--red:#ef4444;--text:#e2e8f0;--dim:#6b7280;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;background-image:radial-gradient(ellipse at 20% 50%,rgba(0,240,255,.03) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(192,132,252,.03) 0%,transparent 60%)}
.header{grid-column:1/5;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-right{display:flex;align-items:center;gap:16px;font-size:13px}
.badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.05em}
.badge-cyan{background:rgba(0,240,255,.15);color:var(--cyan)}
.badge-magenta{background:rgba(192,132,252,.15);color:var(--magenta)}
.badge-pass{background:rgba(34,211,167,.15);color:var(--green)}
.badge-fail{background:rgba(239,68,68,.15);color:var(--red)}
.dim{color:var(--dim)}
.green{color:var(--green)}
.num{font-family:var(--mono);font-size:20px;font-weight:700}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:16px}
#app{display:grid;gap:16px;grid-template-columns:1fr 1fr 1fr 1fr;max-width:1400px;margin:0 auto;padding:20px}
.kernel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kernel-node{position:relative;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;transition:all .3s}
.kernel-node:hover{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,240,255,.1)}
.kn-status{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%}
.kn-name{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kn-ticks{font-family:var(--mono);font-size:16px;font-weight:700}
.kn-delta{font-family:var(--mono);font-size:11px;color:var(--dim)}
.kn-sla{font-size:11px;color:var(--green);margin-top:2px}
.kn-sub{font-size:10px;color:var(--dim);margin-top:4px;font-family:var(--mono)}
.iq-number{font-family:var(--mono);font-size:48px;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.iq-number .iq-label{font-size:14px;font-weight:600;-webkit-text-fill-color:var(--dim);margin-left:8px}
.iq-dims{display:flex;flex-direction:column;gap:10px}
.iq-row{display:flex;align-items:center;gap:8px;font-size:12px}
.iq-row span:first-child{flex:1;color:var(--dim);text-transform:capitalize}
.iq-row span:nth-child(2){font-family:var(--mono);width:48px;text-align:right}
.iq-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.iq-fill{height:100%;border-radius:2px;transition:width .5s ease}
.comp-rules{display:flex;flex-direction:column;gap:6px}
.comp-rule{display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 8px;border-radius:6px;background:var(--surface2)}
.comp-rule.pass{border-left:2px solid var(--green)}
.comp-rule.fail{border-left:2px solid var(--red)}
.comp-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.darwin-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:8px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;border-radius:2px;transition:width .5s}
.grid-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-2col div{text-align:center;padding:10px;background:var(--surface2);border-radius:8px}
.grid-2col .num{display:block;margin-bottom:2px}
.stats-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;padding:6px 8px;background:var(--surface2);border-radius:6px}
.stats-row .val{font-family:var(--mono);color:var(--cyan)}
.bt-card{grid-column:1/5}
.bt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.bt-item{font-size:11px;padding:8px 10px;background:var(--surface2);border-radius:6px;color:var(--dim)}
.bt-num{font-family:var(--mono);font-size:10px;color:var(--cyan);margin-right:6px;font-weight:700}
.missing-card{opacity:.5;pointer-events:none}
.footer{grid-column:1/5;text-align:center;padding:20px;font-size:13px;color:var(--dim)}
a{color:var(--cyan);text-decoration:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API='/api/health';
const COLORS={Healthy:'#22d3a7',Degraded:'#fbbf24',Failed:'#ef4444',Unknown:'#6b7280'};
const NAMES=["nano","curie","planck","freud","galileo","yairoslaw","hawking","turing","knowledge","nash","darwin","yudai"];
const DIMS=["working_memory","processing_speed","logical_reasoning","knowledge_integration","resilience","experience"];
let data=null;
function statusColor(s){return COLORS[s]||COLORS.Unknown}
function v(v,def=0){return v!==undefined&&v!==null?v:def}
function maybe(obj,path,def=0){try{return path.split('.').reduce((o,k)=>o[k],obj)||def}catch(e){return def}}
function val(s){return typeof s==='number'?s.toLocaleString():s||'—'}
function kernelSub(i,d,fit,comp){
  switch(i){
    case 0: return v(d.workers,0)+'W · '+val(d.total_tasks)+' tasks';
    case 1: return (d.phase||'—')+' · proofs '+val(d.proof_count);
    case 2: return val(d.completed)+'/'+val(d.planned)+' plans';
    case 3: return val(d.memory_entries)+' memories';
    case 4: return val(d.total_reviews)+' reviews';
    case 5: return 'peers '+val(d.peers)+(d.am_i_leader?' · leader':'');
    case 6: return val(d.facts)+' facts · conf '+v(d.avg_confidence,0).toFixed(2);
    case 7: return val(d.checks_passed)+'/'+val(d.checks_run)+' checks';
    case 8: return val(d.fact_count)+' facts · '+val(d.source_count)+' sources';
    case 9: return val(d.games_registered)+' games · '+val(d.decisions_made)+' decisions';
    case 10: return 'fit: '+fit.toFixed(3);
    case 11: return comp.filter(c=>c.passed).length+'/'+comp.length+' pass';
    default: return '';
  }
}
async function fetchData(){
  try{
    const r=await fetch(API);const d=await r.json();
    if(data){const k=d.kernel_health||[];const ok=data.kernel_health||[];
      d._ticks_delta=k.map((k,i)=>k.ticks_total-(ok[i]?.ticks_total||k.ticks_total));
    }data=d;render();
  }catch(e){console.error(e);document.getElementById('app').innerHTML='<div class="card" style="grid-column:1/5;text-align:center;padding:40px"><h2>Runtime unavailable</h2><p class="dim" style="margin-top:8px;font-size:14px">The runtime is starting up. Auto-retrying...</p></div>'}
}
function render(){
  if(!data)return;
  const h=data,k=h.kernel_health||[],y=k[11]?.details||{},iq=h.iq_test_battery||{},
    econ=h.economy||{},kpi=h.kpi||{},sc=h.scaler||{},
    dar=k[10]?.details||{},darEs=dar.engine_stats?.[0]||{};
  let fsiq=v(iq.full_scale_iq,0);
  let comp=y.compliance||[];
  let gen=v(darEs.generation,v(dar.generation_count,0));
  let pop=v(darEs.population,0);
  let fit=v(dar.fitness,v(darEs.best_fitness,0));
  let boot=h.boot_phase||'running';
  let tokens=v(econ.total_inference_tokens,v(maybe(econ,'by_capability.runtime::cognitive_tick.inference_tokens'),0));
  let sessions=v(econ.session_count,0);
  let calls=v(kpi.total_inference_calls,0);
  let ticks=v(kpi.total_ticks,v(sc.total_ticks,0));
  let workers=v(sc.active_workers,0);
  let sla=v(sc.sla_compliance_pct,100);
  let failed=v(sc.total_failed,0);
  document.getElementById('app').innerHTML=`
    <div class="header">
      <div class="logo">AIGON <span style="font-weight:400;-webkit-text-fill-color:var(--dim)">Agent Society</span></div>
      <div class="header-right">
        <span class="badge badge-cyan">${boot}</span>
        <span class="badge badge-magenta">${fsiq.toFixed(1)} FSIQ</span>
        <span class="dim">Node ${(h.node_id||'').slice(0,12)}</span>
        <span class="dim">${fmt(h.uptime_seconds||0)} uptime</span>
      </div>
    </div>
    <div class="card" style="grid-column:1/3">
      <h2>Kernel Society <span class="dim" style="font-weight:400">— ${k.length} living organisms</span></h2>
      <div class="kernel-grid">${k.map((k,i)=>`
        <div class="kernel-node">
          <div class="kn-status" style="background:${statusColor(k.status)}"></div>
          <div class="kn-name">${i<NAMES.length?NAMES[i]:'k'+i}</div>
          <div class="kn-ticks">${val(k.ticks_total)}</div>
          <div class="kn-delta">${h._ticks_delta?.[i]?'+'+(h._ticks_delta[i]||0):''}</div>
          <div class="kn-sla">${v(k.sla_compliance_pct,100).toFixed(0)}% SLA</div>
          <div class="kn-sub">${kernelSub(i,k.details||{},fit,comp)}</div>
        </div>
      `).join('')}</div>
    </div>
    <div class="card" style="grid-column:3">
      <h2>Intelligence</h2>
      <div class="iq-number">${fsiq.toFixed(1)}<span class="iq-label">FSIQ</span></div>
      <div class="iq-dims">${DIMS.map(d=>{
        const v=iq[d]||0;const bg=v>0.8?'var(--green)':v>0.5?'var(--yellow)':'var(--red)';
        return '<div class="iq-row"><span>'+d.replace(/_/g,' ')+'</span><span>'+v.toFixed(3)+'</span><div class="iq-bar"><div class="iq-fill" style="width:'+(v*100).toFixed(0)+'%;background:'+bg+'\"></div></div></div>';
      }).join('')}
        <div class="stats-row" style="margin-top:12px"><span>Last IQ</span><span class="val">${v(kpi.last_iq_score,0).toFixed(1)}</span></div>
        <div class="stats-row"><span>Extended IQ</span><span class="val">${v(kpi.last_extended_iq_score,0).toFixed(1)}</span></div>
      </div>
    </div>
    <div class="card" style="grid-column:4">
      <h2>Yudai Security <span class="dim" style="font-weight:400">— ${comp.filter(c=>c.passed).length}/${comp.length}</span></h2>
      <div class="comp-rules">${comp.map(c=>'<div class="comp-rule '+(c.passed?'pass':'fail')+'"><div class="comp-badge '+(c.passed?'badge-pass':'badge-fail')+'">'+(c.passed?'PASS':'FAIL')+'</div><span>'+(c.rule||'').replace(/_/g,' ')+'</span></div>').join('')}</div>
    </div>
    <div class="card">
      <h2>Darwin Evolution</h2>
      <div class="darwin-row"><span class="num">${gen.toLocaleString()}</span><span>generations</span></div>
      <div class="darwin-row"><span class="num">${pop.toLocaleString()}</span><span>population</span></div>
      <div class="darwin-row"><span class="num">${fit.toFixed(3)}</span><span>fitness · target 1.0</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(Math.min(fit,1)*100).toFixed(0)}%;background:var(--cyan)"></div></div>
    </div>
    <div class="card">
      <h2>Scaler</h2>
      <div class="stats-row"><span>Active Workers</span><span class="val">${workers}</span></div>
      <div class="stats-row"><span>SLA Compliance</span><span class="val">${sla.toFixed(0)}%</span></div>
      <div class="stats-row"><span>Total Ticks</span><span class="val">${ticks.toLocaleString()}</span></div>
      <div class="stats-row"><span>Failed</span><span class="val" style="color:${failed>0?'var(--red)':'var(--green)'}">${failed}</span></div>
    </div>
    <div class="card">
      <h2>Economy</h2>
      <div class="stats-row"><span>Inference Tokens</span><span class="val">${tokens.toLocaleString()}</span></div>
      <div class="stats-row"><span>Inference Calls</span><span class="val">${calls.toLocaleString()}</span></div>
      <div class="stats-row"><span>Sessions</span><span class="val">${sessions.toLocaleString()}</span></div>
      <div class="stats-row"><span>Cognitive Distills</span><span class="val">${v(kpi.total_cognitive_distills,0)}</span></div>
    </div>
    <div class="card bt-card">
      <h2>15 Breakthroughs</h2>
      <div class="bt-grid">${[
        'Compiled Runtime > native ms cold start','12-Kernel Society > 12 consensus-driven organisms',
        'Mesh Federation > MAIPS, Raft CRDT, TLS','Cognitive ISA > 6 instructions, all behavior',
        'Virtual Context Memory > 64-bit L1/L2/L3','Knowledge Fabric > Entity, Evidence, Timeline',
        'Darwin Evolution > '+gen.toLocaleString()+' gen genetic opt',
        'Immune System > entropy + neutralization','Time Machine > append-only temporal replay',
        'IQ Battery > '+fsiq.toFixed(1)+' FSIQ, 6 dims','Yudai Security > 8 rules, every tick',
        'Cognitive Trace > full audit trail','Semantic ABI > provider contract',
        'Runtime Physics > 7 cognition laws','Runtime Biology > organism model'
      ].map((b,i)=>'<div class="bt-item"><span class="bt-num">'+String(i+1).padStart(2,'0')+'</span>'+
        b.replace('>','<span class="dim">—</span> ')+'</div>').join('')}</div>
    </div>
    <div class="footer">
      AIGON Agent Society · Qwen Cloud Hackathon 2026 · Runtime v2 · ${fsiq.toFixed(1)} FSIQ · ${sla.toFixed(0)}% SLA
      <div class="dim" style="margin-top:4px;font-size:12px">
        Status: <a href="https://github.com/aigon-x/aigon-agent-society-qwen-hack" target="_blank">live dashboard</a>
        · GitHub: aigon-x/aigon-agent-society-qwen-hack
        · Stack: Alibaba ECS g7nex.large + Qwen Cloud MaaS
      </div>
    </div>
  `;
}
function fmt(s){const d=Math.floor(s/86400);s%=86400;const h=Math.floor(s/3600);s%=3600;const m=Math.floor(s/60);s%=60;return d+'d '+h+'h '+m+'m '+s+'s'}
fetchData();setInterval(fetchData,5000);
</script>
</body>
</html>
