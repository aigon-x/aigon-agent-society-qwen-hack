<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AIGON Mesh Federation — Control Plane</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0b0f;--surface:#111318;--surface2:#181b24;--border:#23263b;--cyan:#00f0ff;--magenta:#c084fc;--green:#22d3a7;--yellow:#fbbf24;--red:#ef4444;--text:#e2e8f0;--dim:#6b7280;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;background-image:radial-gradient(ellipse at 20% 50%,rgba(0,240,255,.03) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(192,132,252,.03) 0%,transparent 60%)}
.header{grid-column:1/5;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-right{display:flex;align-items:center;gap:12px;font-size:12px}
.badge{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.05em}
.badge-cyan{background:rgba(0,240,255,.15);color:var(--cyan)}
.badge-magenta{background:rgba(192,132,252,.15);color:var(--magenta)}
.badge-green{background:rgba(34,211,167,.15);color:var(--green)}
.badge-yellow{background:rgba(251,191,36,.15);color:var(--yellow)}
.dim{color:var(--dim)}.green{color:var(--green)}.num{font-family:var(--mono);font-size:18px;font-weight:700}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
h2{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:12px}
#app{display:grid;gap:12px;grid-template-columns:1fr 1fr 1fr 1fr;max-width:1440px;margin:0 auto;padding:16px}
.f1{grid-column:1/5}.f2{grid-column:1/3}.f3{grid-column:3/5}.f3a{grid-column:1/2}.f3b{grid-column:2/5}
.node-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.node-tab{padding:5px 10px;border-radius:5px;font-size:10px;font-weight:600;background:var(--surface2);border:1px solid var(--border);cursor:default;display:flex;align-items:center;gap:5px}
.node-tab.active{border-color:var(--cyan)}.node-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.matrix{display:grid;gap:3px;font-size:10px}
.matrix-header{display:contents}
.matrix-header>div{padding:4px 6px;background:var(--surface2);border-radius:4px;font-weight:600;color:var(--cyan);text-align:center;font-size:9px;text-transform:uppercase}
.matrix-row{display:contents}
.matrix-row>div{padding:4px 6px;background:var(--surface2);border-radius:3px;text-align:center;font-family:var(--mono);font-size:9px}
.matrix-row>.kname{text-align:left;color:var(--cyan);font-weight:600;font-size:9px}
.kstat{width:100%;height:3px;border-radius:2px;background:var(--border);margin-top:2px;overflow:hidden}
.kstat-fill{height:100%;border-radius:2px}
.comp-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:11px;border-bottom:1px solid var(--border)}
.comp-row:last-child{border:0}
.comp-label{color:var(--dim)}.comp-val{font-family:var(--mono)}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.grid-4>div{text-align:center;padding:8px;background:var(--surface2);border-radius:6px}
.grid-4 .num{display:block}.grid-4 .lb{font-size:10px;color:var(--dim)}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.grid-3>div{text-align:center;padding:6px;background:var(--surface2);border-radius:5px;font-size:10px}
.grid-3 .num{font-size:16px}
.node-compare{display:grid;gap:3px;font-size:10px;grid-template-columns:auto 1fr 1fr 1fr}
.node-compare>div{padding:3px 6px;background:var(--surface2);border-radius:3px;text-align:center}
.node-compare>.label{text-align:left;color:var(--dim);font-weight:500}
.nc-val{font-family:var(--mono)}.nc-best{color:var(--green)}
.error-card{grid-column:1/5;text-align:center;padding:30px;color:var(--red)}.error-card h2{color:var(--red)}
.bt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.bt-item{font-size:10px;padding:6px 8px;background:var(--surface2);border-radius:5px;color:var(--dim)}
.bt-num{font-family:var(--mono);font-size:9px;color:var(--cyan);margin-right:4px;font-weight:700}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API='/mesh/api/health';
const PEERS=[{id:'prod',label:'PROD',url:API},{id:'monitor',label:'Monitor',url:'/mesh/api/peer/100.110.245.84/health'},{id:'sec',label:'Sec',url:'/mesh/api/peer/sec.aigon.dev/health'}];
const NAMES=["nano","curie","planck","freud","galileo","yairoslaw","hawking","turing","knowledge","nash","darwin","yudai"];
const IQ_DIMS=["working_memory","processing_speed","logical_reasoning","knowledge_integration","resilience","experience","learning_velocity","pattern_recognition"];
let nodes={}, peerData={}, loaded=0;
function sc(c){return c>=0.8?'var(--green)':c>=0.5?'var(--yellow)':'var(--red)'}
function ss(s){return s||'?'}
function fmt(s){const d=Math.floor(s/86400);s%=86400;const h=Math.floor(s/3600);s%=3600;const m=Math.floor(s/60);s%=60;return d+'d '+h+'h '+m+'m '+s+'s'}
async function loadAll(){
  const results=await Promise.allSettled(PEERS.map(p=>fetch(p.url).then(r=>r.json()).then(d=>({id:p.id,label:p.label,data:d}))));
  peerData={};loaded=0;
  for(const r of results){
    if(r.status==='fulfilled'){peerData[r.value.id]=r.value.data;loaded++;}
  }
  if(loaded===0){renderError();return;}
  nodes={};
  for(const [id,d] of Object.entries(peerData)){
    const m=d.mesh||{};
    for(const n of m.nodes||[]) nodes[n.node_id]=n;
  }
  render();
}
function renderError(){
  document.getElementById('app').innerHTML='<div class="error-card"><h2>Connection Error</h2><p>Cannot connect to any mesh peer</p></div>';
}
function render(){
  const app=document.getElementById('app');
  const prods=peerData.prod||{}; const mons=peerData.monitor||{}; const secs=peerData.sec||{};
  const all=[prods,mons,secs].filter(Boolean);
  const prodMesh=prods.mesh||{}; const prodK=prods.kernel_health||[];
  const monK=mons.kernel_health||[]; const secK=secs.kernel_health||[];
  const pIq=prods.iq_test_battery||{}; const mIq=mons.iq_test_battery||{}; const sIq=secs.iq_test_battery||{};
  const pFsiq=pIq.full_scale_iq||0; const mFsiq=mIq.full_scale_iq||0; const sFsiq=sIq.full_scale_iq||0;
  const totalKernels = (prodK.length)+(monK.length)+(secK.length);
  // Compute per-node kernel summaries
  function kernSum(k){const es=(k[10]?.details?.engine_stats||[])[0]||{}; return{ticks:k[0]?.ticks_total||0,fit:es.best_fitness||k[10]?.details?.fitness||0,gen:es.generation||k[10]?.details?.generation_count||0,pop:es.population||0};}
  function peerIQ(iq){return IQ_DIMS.map(d=>{const v=iq[d];return v!==undefined?{dim:d,val:v}:null}).filter(Boolean);}
  app.innerHTML=`
    <div class="header f1">
      <div class="logo">AIGON <span style="font-weight:400;-webkit-text-fill-color:var(--dim)">Mesh Federation</span></div>
      <div class="header-right">
        <span class="badge badge-cyan">Control Plane</span>
        <span class="badge badge-magenta">${totalKernels} kernels</span>
        <span class="badge badge-green">${loaded}/3 nodes</span>
        <span class="dim">${fmt(prods.uptime_seconds||0)}</span>
      </div>
    </div>
    <div class="card f2">
      <h2>Federation Nodes <span class="dim">— ${Object.keys(nodes).length} total in mesh</span></h2>
      <div class="node-tabs">
        ${Object.entries(nodes).map(([nid,n])=>{
          const status=n.state||'Healthy';
          return '<div class="node-tab"><div class="node-dot" style="background:'+(status==='Healthy'?'var(--green)':'var(--yellow)')+'"></div>'+
            '<span>'+(n.role||'?').slice(0,5)+': '+(n.node_id||'?').slice(0,12)+'</span>'+
            '<span class="dim">'+(n.listen_addr||'')+'</span></div>';
        }).join('')}
      </div>
      <div class="grid-4">
        <div><div class="num">${Object.keys(nodes).length}</div><div class="lb">mesh nodes</div></div>
        <div><div class="num">${totalKernels}</div><div class="lb">total kernels</div></div>
        <div><div class="num">${prodMesh.healthy_peers||0}</div><div class="lb">healthy peers</div></div>
        <div><div class="num" style="color:${prodMesh.has_quorum?'var(--green)':'var(--red)'}">${prodMesh.has_quorum?'YES':'NO'}</div><div class="lb">quorum</div></div>
      </div>
    </div>
    <div class="card f3">
      <h2>Node IQ Comparison</h2>
      <div class="grid-3">
        <div><div class="num">${pFsiq.toFixed(1)}</div><div class="dim">PROD</div></div>
        <div><div class="num">${mFsiq.toFixed(1)}</div><div class="dim">Monitor</div></div>
        <div><div class="num">${sFsiq.toFixed(1)}</div><div class="dim">Sec</div></div>
      </div>
      <div style="margin-top:8px;background:var(--surface2);border-radius:5px;padding:6px">
        <div class="node-compare" style="grid-template-columns:auto 1fr 1fr 1fr">
          <div class="label">dimension</div><div class="dim">PROD</div><div class="dim">Mon</div><div class="dim">Sec</div>
          ${((()=>{
            const dims=new Set();[peerIQ(pIq),peerIQ(mIq),peerIQ(sIq)].forEach(arr=>arr.forEach(d=>dims.add(d.dim)));
            return Array.from(dims).map(d=>{
              const pv=pIq[d], mv=mIq[d], sv=sIq[d];
              return '<div class="label">'+d.replace(/_/g,' ')+'</div>'+
                '<div class="nc-val'+(pv>=mv&&pv>=sv?' nc-best':'')+'">'+(pv!==undefined?pv.toFixed(3):'-')+'</div>'+
                '<div class="nc-val'+(mv>=pv&&mv>=sv?' nc-best':'')+'">'+(mv!==undefined?mv.toFixed(3):'-')+'</div>'+
                '<div class="nc-val'+(sv>=pv&&sv>=mv?' nc-best':'')+'">'+(sv!==undefined?sv.toFixed(3):'-')+'</div>';
            }).join('');
          })()}
        </div>
      </div>
    </div>
    <div class="card f2">
      <h2>Node × Kernel Matrix <span class="dim">— ${totalKernels} organisms across ${loaded} nodes</span></h2>
      <div style="overflow-x:auto">
      <div class="matrix" style="grid-template-columns:60px repeat(${loaded},1fr)">
        <div class="matrix-header"><div>kernel</div>${['PROD','Monitor','Sec'].slice(0,loaded).map(l=>'<div>'+l+'</div>').join('')}</div>
        ${NAMES.map((name,i)=>{
          const pk=prodK[i], mk=monK[i], sk=secK[i];
          function cell(k){
            if(!k) return '<div class="dim">—</div>';
            const d=k.details||{};
            let prim='';
            switch(i){
              case 0: prim=(d.workers||0)+'W '+((d.total_tasks||0)/1000|0)+'K'; break;
              case 1: prim=d.phase||'?'; break;
              case 2: prim=(d.planned||0)+'p'; break;
              case 3: prim=(d.memory_entries||0)+'m '+(d.session_count||0)+'s'; break;
              case 4: prim=(d.rules_loaded||0)+'R '+(d.total_reviews||0)+'v'; break;
              case 5: prim='P'+(d.peers||0)+' gc'+(d.gcounter_value||0); break;
              case 6: prim=(d.facts||0)+'F '+(d.avg_confidence||0)*100+'%'; break;
              case 7: prim=(d.checks_passed||0)+'/'+(d.checks_run||0); break;
              case 8: prim=(d.source_count||0)+'src '+(d.fact_count||0)+'f'; break;
              case 9: prim=(d.games_registered||0)+'G '+(d.decisions_made||0)+'D'; break;
              case 10:{const es=(d.engine_stats||[])[0]||{}; prim='f'+((d.fitness||0)*100|0)+'% g'+es.generation; break;}
              case 11:{const cp=(d.compliance||[]); prim=cp.filter(c=>c.passed).length+'/8 '+(d.scan_count||0)+'sc'; break;}
            }
            return '<div style="font-size:8px">'+prim+'</div>';
          }
          return '<div class="matrix-row"><div class="kname">'+name+'</div>'+cell(pk)+cell(mk)+cell(sk)+'</div>';
        }).join('')}
      </div>
      </div>
    </div>
    <div class="card f3">
      <h2>Platform Versions</h2>
      <div class="comp-row"><span class="comp-label">Runtime</span><span class="comp-val">${prods.runtime||'?'}</span></div>
      <div class="comp-row"><span class="comp-label">Build</span><span class="comp-val">${prods.config_fingerprint?.version||'?'}</span></div>
      <div class="comp-row"><span class="comp-label">Kernels</span><span class="comp-val">${prods.kernels?.healthy||0}/${prods.kernels?.total||0}</span></div>
      <div class="comp-row"><span class="comp-label">JWT Security</span><span class="comp-val">${prods.config_fingerprint?.jwt_secret_is_placeholder?'⚠️ DEFAULT':'✅ SECURE'}</span></div>
      <div class="comp-row"><span class="comp-label">Boot Phase</span><span class="comp-val">${prods.boot_phase||'?'}</span></div>
    </div>
    <div class="card">
      <h2>Synchronization</h2>
      <div class="comp-row"><span class="comp-label">PROD tick</span><span class="comp-val">${(prodK[0]?.ticks_total||0).toLocaleString()}</span></div>
      <div class="comp-row"><span class="comp-label">Monitor tick</span><span class="comp-val">${(monK[0]?.ticks_total||0).toLocaleString()}</span></div>
      <div class="comp-row"><span class="comp-label">Sec tick</span><span class="comp-val">${(secK[0]?.ticks_total||0).toLocaleString()}</span></div>
      <div class="comp-row"><span class="comp-label">Tick rate (PROD)</span><span class="comp-val">${(prods.sensor?.tick_rate||0).toFixed(3)} Hz</span></div>
      <div class="comp-row"><span class="comp-label">Tick rate (Mon)</span><span class="comp-val">${(mons.sensor?.tick_rate||0).toFixed(3)} Hz</span></div>
      <div class="comp-row"><span class="comp-label">Scaler workers</span><span class="comp-val">${prods.scaler?.active_workers||0}</span></div>
      <div class="comp-row"><span class="comp-label">Total ticks ever</span><span class="comp-val">${(prods.scaler?.total_ticks||0).toLocaleString()}</span></div>
    </div>
    <div class="card">
      <h2>Self-Improvement</h2>
      ${(prods.self_improvement?.latest_drift) ? (()=>{
        const ld=prods.self_improvement.latest_drift;
        return Object.entries(ld).filter(([k])=>k!=='recommendations').map(([k,v])=>{
          const pct=(typeof v==='number')?(v*100).toFixed(1):v;
          const color=typeof v==='number'?(v<0.1?'var(--green)':v<0.3?'var(--yellow)':'var(--red)'):'var(--dim)';
          return '<div class="comp-row"><span class="comp-label">'+k.replace(/_/g,' ')+'</span><span class="comp-val" style="color:'+color+'">'+pct+'%</span></div>';
        }).join('');
      })() : '<div class="dim">No drift data</div>'}
      <div class="comp-row"><span class="comp-label">Drift reports</span><span class="comp-val">${prods.self_improvement?.drift_reports||0}</span></div>
      <div style="margin-top:6px;padding:6px;background:var(--surface2);border-radius:5px;font-size:10px;color:var(--dim)">
        ${((prods.self_improvement?.latest_drift?.recommendations||[]).join('; '))||'No recommendations'}
      </div>
    </div>
    <div class="card">
      <h2>Darwin Per Node</h2>
      ${(()=>{
        function dar(k){const es=(k[10]?.details?.engine_stats||[])[0]||{}; return{fit:k[10]?.details?.fitness||0,gen:es.generation||k[10]?.details?.generation_count||0,pop:es.population||0,param:k[10]?.details?.current_parameter||0};}
        const pd=dar(prodK), md=dar(monK), sd=dar(secK);
        return '<div class="node-compare"><div class="label"></div><div class="dim">PROD</div><div class="dim">Mon</div><div class="dim">Sec</div>'+
          '<div class="label">fitness</div><div class="nc-val">'+(pd.fit*100|0)+'%</div><div class="nc-val">'+(md.fit*100|0)+'%</div><div class="nc-val">'+(sd.fit*100|0)+'%</div>'+
          '<div class="label">generations</div><div class="nc-val">'+pd.gen+'</div><div class="nc-val">'+md.gen+'</div><div class="nc-val">'+sd.gen+'</div>'+
          '<div class="label">population</div><div class="nc-val">'+pd.pop.toLocaleString()+'</div><div class="nc-val">'+md.pop.toLocaleString()+'</div><div class="nc-val">'+sd.pop.toLocaleString()+'</div>'+
          '<div class="label">parameter</div><div class="nc-val">'+(pd.param*100|0)+'%</div><div class="nc-val">'+(md.param*100|0)+'%</div><div class="nc-val">'+(sd.param*100|0)+'%</div>'+
        '</div>';
      })()}
    </div>
    <div class="card">
      <h2>Entropy <span class="dim">— 5 dimensions</span></h2>
      <div class="comp-row"><span class="comp-label">total</span><span class="comp-val">${(prods.entropy?.total_entropy||0).toFixed(4)}</span></div>
      <div class="comp-row"><span class="comp-label">architecture</span><span class="comp-val">${(prods.entropy?.architecture_entropy||0).toFixed(4)}</span></div>
      <div class="comp-row"><span class="comp-label">knowledge</span><span class="comp-val">${(prods.entropy?.knowledge_entropy||0).toFixed(4)}</span></div>
      <div class="comp-row"><span class="comp-label">trust</span><span class="comp-val">${(prods.entropy?.trust_entropy||0).toFixed(4)}</span></div>
      <div class="comp-row"><span class="comp-label">average</span><span class="comp-val">${(prods.entropy?.average_entropy||0).toFixed(4)}</span></div>
    </div>
    <div class="card">
      <h2>Immune System</h2>
      <div class="comp-row"><span class="comp-label">state</span><span class="comp-val" style="color:${prods.immune_system?.state==='Healthy'?'var(--green)':'var(--red)'}">${prods.immune_system?.state||'?'}</span></div>
      <div class="comp-row"><span class="comp-label">threats detected</span><span class="comp-val">${prods.immune_system?.threats_detected||0}</span></div>
      <div class="comp-row"><span class="comp-label">repairs made</span><span class="comp-val">${prods.immune_system?.repairs_made||0}</span></div>
    </div>
    <div class="card">
      <h2>System Errors</h2>
      <div class="grid-4">
        <div><div class="num">${prods.system_errors?.total_errors||0}</div><div class="lb">total</div></div>
        <div><div class="num">${prods.system_errors?.db_connection_errors||0}</div><div class="lb">db errors</div></div>
        <div><div class="num">${prods.system_errors?.kernel_crash_count||0}</div><div class="lb">crashes</div></div>
        <div><div class="num">${prods.system_errors?.mesh_peer_timeouts||0}</div><div class="lb">peer timeouts</div></div>
        <div><div class="num">${prods.system_errors?.tick_write_failures||0}</div><div class="lb">write fails</div></div>
        <div><div class="num">${(prods.system_errors?.slo_violations||[]).length}</div><div class="lb">SLO violations</div></div>
      </div>
    </div>
    <div class="card">
      <h2>Context & Memory</h2>
      <div class="grid-4">
        <div><div class="num">${prods.context_stats?.active_sessions||0}</div><div class="lb">active sess</div></div>
        <div><div class="num">${prods.context_stats?.context_messages_total||0}</div><div class="lb">messages</div></div>
        <div><div class="num">${prods.economy?.session_count||0}</div><div class="lb">total sessions</div></div>
        <div><div class="num">${(prods.economy?.total_inference_tokens||0).toLocaleString()}</div><div class="lb">tokens total</div></div>
        <div><div class="num">${(prods.sensor?.memory_mb||0)} MB</div><div class="lb">memory</div></div>
        <div><div class="num">${(prods.sensor?.cpu_load||0).toFixed(1)}</div><div class="lb">cpu load</div></div>
      </div>
    </div>
    <div class="card">
      <h2>KPI</h2>
      <div class="comp-row"><span class="comp-label">Extended IQ</span><span class="comp-val">${prods.kpi?.last_extended_iq_score||0}</span></div>
      <div class="comp-row"><span class="comp-label">Standard IQ</span><span class="comp-val">${prods.kpi?.last_iq_score||0}</span></div>
      <div class="comp-row"><span class="comp-label">Cognitive distills</span><span class="comp-val">${(prods.kpi?.total_cognitive_distills||0).toLocaleString()}</span></div>
      <div class="comp-row"><span class="comp-label">Inference calls</span><span class="comp-val">${(prods.kpi?.total_inference_calls||0).toLocaleString()}</span></div>
      <div class="comp-row"><span class="comp-label">Time Machine records</span><span class="comp-val">${(prods.time_machine?.records||0).toLocaleString()}</span></div>
      <div class="comp-row"><span class="comp-label">Record range</span><span class="comp-val">tick ${prods.time_machine?.oldest_tick||0} → ${prods.time_machine?.current_tick||0}</span></div>
    </div>
    <div class="card f3">
      <h2>Economy by Capability</h2>
      ${(prods.economy?.by_capability) ? Object.entries(prods.economy.by_capability).map(([cap,data])=>{
        const short=cap.split('::').pop();
        return '<div style="margin-bottom:6px"><div class="comp-row"><span class="comp-label">'+short+'</span><span class="comp-val">'+(data.inference_tokens||0).toLocaleString()+' tok</span></div>'+
          '<div style="display:flex;gap:8px;font-size:9px;color:var(--dim);padding-left:8px">'+
          'CPU: '+(data.cpu_ms||0)+'ms GPU: '+(data.gpu_ms||0)+'ms KO: '+(data.knowledge_ops||0)+' RO: '+(data.reasoning_ops||0)+'</div></div>';
      }).join('') : '<div class="dim">No data</div>'}
    </div>
    <div class="card f2">
